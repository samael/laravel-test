openapi: 3.0.3
info:
  title: Laravel Test API
  description: API documentation for ticket creation and ticket statistics.
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local server
paths:
  /api/v1/tickets:
    post:
      tags:
        - Tickets
      summary: Create a ticket
      description: Creates a customer ticket from the feedback widget payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreateRequest'
            examples:
              default:
                value:
                  name: John Doe
                  phone: "+380991112233"
                  email: john@example.com
                  topic: Billing issue
                  body: Need help with billing details.
      responses:
        '201':
          description: Ticket created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketStoreResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/tikets/statistics:
    get:
      tags:
        - Tickets
      summary: Get ticket statistics
      description: Returns ticket statistics grouped by status for selected period.
      parameters:
        - in: query
          name: period
          required: false
          schema:
            type: string
            enum: [day, week, month]
            default: day
          description: Statistics period.
      responses:
        '200':
          description: Statistics fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketStatisticsResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
components:
  schemas:
    TicketCreateRequest:
      type: object
      required:
        - name
        - phone
        - email
        - topic
        - body
      properties:
        name:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 255
        topic:
          type: string
          maxLength: 255
        body:
          type: string
          maxLength: 3000

    TicketStoreResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TicketData'
        message:
          type: string
          example: Thank you! Your request has been sent. We will contact you soon.

    TicketData:
      type: object
      properties:
        id:
          type: integer
          example: 101
        topic:
          type: string
          example: Billing issue
        body:
          type: string
          example: Need help with billing details.
        status:
          type: string
          enum: [new, at work, processed]
        date_at:
          type: string
          format: date-time
        customer:
          $ref: '#/components/schemas/TicketCustomer'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TicketCustomer:
      type: object
      properties:
        id:
          type: integer
          example: 12
        name:
          type: string
          example: John Doe
        phone:
          type: string
          example: "+380991112233"
        email:
          type: string
          format: email
          example: john@example.com

    TicketStatisticsResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TicketStatisticsData'

    TicketStatisticsData:
      type: object
      properties:
        period:
          type: string
          enum: [day, week, month]
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        total:
          type: integer
          example: 14
        by_status:
          type: object
          properties:
            new:
              type: integer
              example: 6
            "at work":
              type: integer
              example: 5
            processed:
              type: integer
              example: 3

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
